<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>My account | neoKesan</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Aleo:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head>
<body class="account-body">
  <div data-site-header></div>
  <main class="account-shell">
    <aside class="account-sidebar"><div class="avatar">NK</div><h2>My account</h2><p id="account-name">Garden grower</p><nav><a class="active" href="#profile">Profile</a><a href="#addresses">Addresses</a><a href="#garden">Garden details</a><a href="#orders">Orders</a><button class="sidebar-signout">Sign out</button></nav></aside>
    <section class="account-content"><div class="account-heading"><span class="eyebrow" style="color:var(--green)">Your neoKesan account</span><h1>Personal details</h1><p>Keep your profile up to date for a more personal growing experience.</p></div>
      <form id="profile" class="profile-form"><div class="form-grid"><label>First name<input id="first-name" required placeholder="Your first name"></label><label>Last name<input id="last-name" placeholder="Your last name"></label><label>Email address<input id="profile-email" type="email" placeholder="you@example.com"></label><label>Mobile number<input id="profile-phone" type="tel" placeholder="+91 98765 43210"></label><label>Date of birth<input id="profile-age" type="date"></label><label>Preferred language<select id="profile-language"><option>English</option><option>Hindi</option><option>Bengali</option><option>Marathi</option></select></label></div><button class="button primary" type="submit">Save profile</button></form>
      <section class="account-section" id="addresses"><div class="account-section-head"><h2>Addresses</h2><button class="text-link" id="add-address" type="button">+ Add address</button></div><div id="address-list" class="address-list"><p class="empty-state">No delivery address saved yet.</p></div><form id="address-form" class="address-form hidden"><div class="form-grid"><label>Address label<input id="address-label" placeholder="Home, Work, Farm"></label><label>Recipient name<input id="address-name" placeholder="Full name"></label><label class="wide">Street address<input id="address-street" placeholder="House / flat number, street"></label><label>City<input id="address-city" placeholder="City"></label><label>State<input id="address-state" placeholder="State"></label><label>PIN code<input id="address-pin" inputmode="numeric" placeholder="PIN code"></label></div><button class="button primary" type="submit">Save address</button></form></section>
      <section class="account-section" id="garden"><div class="account-section-head"><h2>Garden details</h2></div><div class="form-grid"><label>Growing setup<select><option>Choose a setup</option><option>Kratky / passive</option><option>DWC / NFT</option><option>Coco / soil-less media</option><option>Soil garden</option></select></label><label>What do you grow?<input placeholder="e.g. herbs, tomatoes, flowers"></label></div></section>
    </section>
  </main><div data-site-footer></div><div class="toast" id="toast">Saved successfully</div><script src="shared-layout.js" defer></script><script src="script.js" defer></script>
</body></html>
